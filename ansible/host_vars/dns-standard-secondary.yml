---
# dns-standard-secondary: Standard blocklist, Secondary instance
# Proxmox Node: maxwell | LXC ID: 121

profile: standard
role: secondary

# Network IPs (functional naming: trusted, mgmt, storage)
trusted_ip: "192.168.1.21"
mgmt_ip: "192.168.5.21"
storage_ip: "192.168.11.21"

# Legacy aliases (for backward compatibility)
dns_ip: "{{ trusted_ip }}"
transfer_ip: "{{ storage_ip }}"

# Sync configuration (secondary syncs FROM primary over storage network)
sync_partner: "dns-standard-primary"
sync_partner_storage_ip: "192.168.11.20"
sync_partner_transfer_ip: "{{ sync_partner_storage_ip }}"
