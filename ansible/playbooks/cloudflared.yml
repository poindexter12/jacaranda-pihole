---
# Cloudflared DNS-over-HTTPS Proxy Playbook
#
# Installs cloudflared as a sidecar service on Pi-hole LXCs.
# Pi-hole queries cloudflared on 127.0.0.1:5053, which forwards to Cloudflare over HTTPS.
#
# Usage:
#   ansible-playbook -i inventory/pihole-lxc.yml playbooks/cloudflared.yml
#
# Profile-aware upstream:
#   - standard:   1.1.1.1 (Cloudflare default)
#   - restricted: 1.1.1.3 (Cloudflare Family - blocks malware + adult)
#
# Tags:
#   install   - Download and install cloudflared binary
#   configure - Deploy config and systemd service
#   verify    - Check cloudflared is running and responding

- name: Install cloudflared DNS-over-HTTPS proxy
  hosts: pihole_lxc
  gather_facts: true

  vars:
    # Cloudflare upstream URLs by profile
    cloudflared_upstream:
      standard: "https://1.1.1.1/dns-query"
      restricted: "https://1.1.1.3/dns-query"

    # Local listening port (Pi-hole will query this)
    cloudflared_port: 5053

    # Architecture mapping for download URL
    cloudflared_arch_map:
      x86_64: "amd64"
      aarch64: "arm64"

  tasks:
    # =========================================================================
    # INSTALLATION
    # =========================================================================
    - name: Check if cloudflared is installed
      ansible.builtin.stat:
        path: /usr/local/bin/cloudflared
      register: cloudflared_binary
      tags: [install]

    - name: Get cloudflared version if installed
      ansible.builtin.command:
        cmd: /usr/local/bin/cloudflared --version
      register: cloudflared_version
      changed_when: false
      failed_when: false
      when: cloudflared_binary.stat.exists
      tags: [install]

    - name: Display cloudflared status
      ansible.builtin.debug:
        msg: >-
          cloudflared {{ 'installed: ' ~ cloudflared_version.stdout | default('unknown')
          if cloudflared_binary.stat.exists else 'not installed - will download' }}
      tags: [install]

    - name: Download cloudflared binary
      ansible.builtin.get_url:
        url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-{{ cloudflared_arch_map[ansible_architecture] }}"
        dest: /usr/local/bin/cloudflared
        mode: "0755"
      when: not cloudflared_binary.stat.exists
      tags: [install]

    - name: Verify cloudflared binary
      ansible.builtin.command:
        cmd: /usr/local/bin/cloudflared --version
      register: cloudflared_installed_version
      changed_when: false
      tags: [install]

    - name: Display installed cloudflared version
      ansible.builtin.debug:
        msg: "Installed: {{ cloudflared_installed_version.stdout }}"
      tags: [install]

    # =========================================================================
    # CONFIGURATION
    # =========================================================================
    - name: Create cloudflared config directory
      ansible.builtin.file:
        path: /etc/cloudflared
        state: directory
        mode: "0755"
      tags: [configure]

    - name: Deploy cloudflared configuration
      ansible.builtin.template:
        src: ../templates/cloudflared.yml.j2
        dest: /etc/cloudflared/config.yml
        mode: "0644"
      notify: Restart cloudflared
      tags: [configure]

    - name: Deploy cloudflared systemd service
      ansible.builtin.template:
        src: ../templates/cloudflared.service.j2
        dest: /etc/systemd/system/cloudflared.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart cloudflared
      tags: [configure]

    - name: Enable and start cloudflared service
      ansible.builtin.systemd:
        name: cloudflared
        state: started
        enabled: true
        daemon_reload: true
      tags: [configure]

    # =========================================================================
    # VERIFICATION
    # =========================================================================
    - name: Wait for cloudflared to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ cloudflared_port }}"
        timeout: 30
      tags: [verify]

    - name: Test DNS resolution via cloudflared
      ansible.builtin.command:
        cmd: dig @127.0.0.1 -p {{ cloudflared_port }} cloudflare.com +short
      register: dns_test
      changed_when: false
      tags: [verify]

    - name: Display verification results
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} cloudflared verification:
          - Profile: {{ profile }}
          - Upstream: {{ cloudflared_upstream[profile] }}
          - Listen: 127.0.0.1:{{ cloudflared_port }}
          - Test query (cloudflare.com): {{ dns_test.stdout_lines | join(', ') }}
          - Status: OK
      tags: [verify]

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: restarted
