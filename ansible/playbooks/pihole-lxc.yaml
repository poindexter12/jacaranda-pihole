---
# Pi-hole LXC Installation Playbook
#
# Installs native Pi-hole v6 on Proxmox LXC containers.
# Run after Terraform creates the LXCs.
#
# Usage:
#   PIHOLE_PASSWORD="yourpass" ansible-playbook -i inventory/prod.yaml playbooks/pihole-lxc.yaml
#
# Tags:
#   install   - Install Pi-hole
#   configure - Configure Pi-hole (password, web binding)
#   verify    - Verify installation

- name: Install and configure Pi-hole on LXC containers
  hosts: pihole_lxc
  gather_facts: true

  pre_tasks:
    - name: Validate PIHOLE_PASSWORD is set
      ansible.builtin.assert:
        that:
          - pihole_password | length > 0
        fail_msg: "PIHOLE_PASSWORD environment variable must be set"
        success_msg: "PIHOLE_PASSWORD is configured"
      tags: [always]

    - name: Wait for LXC to be ready
      ansible.builtin.wait_for_connection:
        timeout: 60
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

  tasks:
    # =========================================================================
    # PRE-FLIGHT CHECKS
    # =========================================================================
    - name: Check if Pi-hole is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/pihole
      register: pihole_binary
      tags: [install]

    - name: Display Pi-hole installation status
      ansible.builtin.debug:
        msg: "Pi-hole {{ 'is already installed' if pihole_binary.stat.exists else 'needs to be installed' }}"
      tags: [install]

    # =========================================================================
    # SYSTEM PREPARATION
    # =========================================================================
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [install]

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
        state: present
      tags: [install]

    # =========================================================================
    # PI-HOLE INSTALLATION (Unattended)
    # =========================================================================
    - name: Create Pi-hole config directory
      ansible.builtin.file:
        path: /etc/pihole
        state: directory
        mode: "0755"
      when: not pihole_binary.stat.exists
      tags: [install]

    - name: Deploy setupVars.conf for unattended install
      ansible.builtin.template:
        src: ../templates/setupVars.conf.j2
        dest: /etc/pihole/setupVars.conf
        mode: "0644"
      when: not pihole_binary.stat.exists
      tags: [install]

    - name: Download Pi-hole installer
      ansible.builtin.get_url:
        url: "{{ pihole_install_url }}"
        dest: /tmp/pihole-install.sh
        mode: "0755"
      when: not pihole_binary.stat.exists
      tags: [install]

    - name: Run Pi-hole unattended installation
      ansible.builtin.command:
        cmd: bash /tmp/pihole-install.sh --unattended
      when: not pihole_binary.stat.exists
      register: pihole_install
      changed_when: pihole_install.rc == 0
      tags: [install]

    - name: Remove installer script
      ansible.builtin.file:
        path: /tmp/pihole-install.sh
        state: absent
      tags: [install]

    # =========================================================================
    # PI-HOLE CONFIGURATION
    # =========================================================================
    - name: Set timezone
      ansible.builtin.command:
        cmd: timedatectl set-timezone {{ pihole_timezone }}
      changed_when: false
      tags: [configure]

    # =========================================================================
    # WEB UI BINDING (Management + Transfer VLANs)
    # =========================================================================
    # Pi-hole v6 uses embedded web server in FTL
    # Configure via pihole.toml or FTLCONF environment
    # Bind to both mgmt (192.168.5.x) and transfer (192.168.11.x) networks
    - name: Configure Web UI to bind to management and transfer IPs
      ansible.builtin.lineinfile:
        path: /etc/pihole/pihole.toml
        regexp: '^(\s*)port\s*='
        line: '  port = "{{ mgmt_ip }}:80o,{{ mgmt_ip }}:443os,{{ transfer_ip }}:80o,{{ transfer_ip }}:443os"'
        insertafter: '^\[webserver\]'
        create: false
      notify: Restart pihole-FTL
      tags: [configure]
      ignore_errors: true  # File may not exist on fresh install

    # Alternative: Create/update pihole.toml if it doesn't exist
    - name: Ensure pihole.toml webserver configuration
      ansible.builtin.blockinfile:
        path: /etc/pihole/pihole.toml
        block: |
          [webserver]
            port = "{{ mgmt_ip }}:80o,{{ mgmt_ip }}:443os,{{ transfer_ip }}:80o,{{ transfer_ip }}:443os"
        marker: "# {mark} ANSIBLE MANAGED - Web UI binding"
        create: true
        mode: "0644"
      notify: Restart pihole-FTL
      tags: [configure]

    # =========================================================================
    # FTL DATABASE RETENTION
    # =========================================================================
    # Limit query history to prevent FTL from consuming all available memory.
    # FTL loads query data into RAM for the dashboard; 91 days (default) can
    # use 800+ MB on a 1 GB LXC, causing OOM kills.
    - name: Configure FTL database retention
      ansible.builtin.command:
        cmd: pihole-FTL --config database.maxDBdays {{ ftl_max_db_days }}
      register: ftl_db_config
      changed_when: ftl_db_config.stdout | trim | int != ftl_max_db_days
      tags: [configure]

    # =========================================================================
    # SERVICE MANAGEMENT
    # =========================================================================
    - name: Ensure pihole-FTL service is enabled and running
      ansible.builtin.systemd:
        name: pihole-FTL
        state: started
        enabled: true
      tags: [configure]

    # Flush handlers (restart FTL) before setting password
    - name: Flush handlers to ensure FTL restart completes
      ansible.builtin.meta: flush_handlers
      tags: [configure]

    - name: Wait for FTL to stabilize after restart
      ansible.builtin.pause:
        seconds: 10
      tags: [configure]

    # =========================================================================
    # SET PASSWORD (after all restarts complete)
    # =========================================================================
    - name: Set Pi-hole admin password
      # Pi-hole v6 uses 'setpassword' instead of '-a -p'
      # Set AFTER all config changes to avoid restart wiping password
      ansible.builtin.command:
        cmd: pihole setpassword '{{ pihole_password }}'
      changed_when: true
      no_log: true
      tags: [configure]

    # =========================================================================
    # VERIFICATION
    # =========================================================================
    - name: Verify Pi-hole status
      ansible.builtin.command:
        cmd: pihole status
      register: pihole_status
      changed_when: false
      tags: [verify]

    - name: Display Pi-hole status
      ansible.builtin.debug:
        var: pihole_status.stdout_lines
      tags: [verify]

    - name: Verify DNS is listening
      ansible.builtin.wait_for:
        host: "{{ dns_ip }}"
        port: 53
        timeout: 30
      tags: [verify]

    - name: Verify Web UI is accessible
      ansible.builtin.uri:
        url: "http://{{ mgmt_ip }}/admin/"
        status_code: [200, 302]
      register: web_check
      retries: 6
      delay: 10
      delegate_to: localhost
      tags: [verify]

    - name: Verify password authentication works
      ansible.builtin.uri:
        url: "http://{{ mgmt_ip }}/api/auth"
        method: POST
        body_format: json
        body:
          password: "{{ pihole_password }}"
        status_code: [200]
        return_content: true
      register: auth_check
      retries: 3
      delay: 5
      no_log: true
      delegate_to: localhost
      tags: [verify]

    - name: Assert password authentication succeeded
      ansible.builtin.assert:
        that:
          - "'password correct' in auth_check.content"
        fail_msg: "Password authentication failed - response: {{ auth_check.content }}"
        success_msg: "Password authentication verified"
      tags: [verify]

    - name: Display verification results
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} verification:
          - Profile: {{ profile }}
          - Role: {{ role }}
          - DNS IP: {{ dns_ip }} (port 53)
          - Web UI: http://{{ mgmt_ip }}/admin/
          - Status: OK
      tags: [verify]

    # =========================================================================
    # SSH USER CA CONFIGURATION
    # =========================================================================
    - name: Include SSH CA role for certificate authentication
      ansible.builtin.include_role:
        name: ../../../../ansible/roles/ssh-ca
      vars:
        ssh_ca_user_pubkey: "{{ lookup('pipe', 'op read op://SSH-CA/ssh-ca-user/public_key') }}"
        ssh_ca_clear_authorized_keys: false
      tags: [ssh-ca]

  handlers:
    - name: Restart pihole-FTL
      ansible.builtin.systemd:
        name: pihole-FTL
        state: restarted
