---
# nebula-sync Deployment Playbook
#
# Deploys nebula-sync on secondary Pi-hole instances to sync config from primaries.
# Run AFTER pihole-lxc.yml has installed Pi-hole on all instances.
#
# Sync topology:
#   pihole-standard-20 (primary) --> pihole-standard-21 (secondary)
#   pihole-restricted-22 (primary) --> pihole-restricted-23 (secondary)
#
# Usage:
#   PIHOLE_PASSWORD="yourpass" ansible-playbook -i inventory/pihole-lxc.yml playbooks/nebula-sync.yml
#
# Tags:
#   install   - Install nebula-sync binary
#   configure - Configure sync settings
#   service   - Set up systemd service and timer

- name: Deploy nebula-sync on secondary Pi-hole instances
  hosts: pihole_secondary
  gather_facts: true

  vars:
    # Package pre-downloaded by `make fetch` to .packagecache/
    # Version pinned in versions.yaml
    nebula_sync_version: "0.11.1"
    nebula_sync_install_dir: /usr/local/bin
    nebula_sync_config_dir: /etc/nebula-sync
    nebula_sync_cron_schedule: "*/15 * * * *"  # Every 15 minutes

  pre_tasks:
    - name: Validate PIHOLE_PASSWORD is set
      ansible.builtin.assert:
        that:
          - pihole_password | length > 0
        fail_msg: "PIHOLE_PASSWORD environment variable must be set"
        success_msg: "PIHOLE_PASSWORD is configured"
      tags: [always]

    - name: Display sync configuration
      ansible.builtin.debug:
        msg: |
          Configuring nebula-sync on {{ inventory_hostname }}:
          - Profile: {{ profile }}
          - Role: {{ role }}
          - Sync FROM: {{ sync_partner }} ({{ sync_partner_transfer_ip }}) over transfer network
      tags: [always]

  tasks:
    # =========================================================================
    # INSTALL FROM LOCAL CACHE
    # =========================================================================
    # Package pre-downloaded by `make prefetch` - no external dependencies
    - name: Check if nebula-sync is installed
      ansible.builtin.stat:
        path: "{{ nebula_sync_install_dir }}/nebula-sync"
      register: nebula_sync_binary
      tags: [install]

    - name: Verify local package exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../.packagecache/nebula-sync/{{ nebula_sync_version }}/nebula-sync_{{ nebula_sync_version }}_linux_amd64.tar.gz"
      register: local_package
      delegate_to: localhost
      run_once: true
      tags: [install]

    - name: Fail if package not fetched
      ansible.builtin.fail:
        msg: "nebula-sync not found in cache. Run 'make fetch' first."
      when:
        - not nebula_sync_binary.stat.exists
        - not local_package.stat.exists
      tags: [install]

    - name: Copy nebula-sync tarball from local cache
      ansible.builtin.unarchive:
        src: "{{ playbook_dir }}/../.packagecache/nebula-sync/{{ nebula_sync_version }}/nebula-sync_{{ nebula_sync_version }}_linux_amd64.tar.gz"
        dest: "{{ nebula_sync_install_dir }}"
        include:
          - nebula-sync
        mode: "0755"
      when: not nebula_sync_binary.stat.exists
      tags: [install]

    - name: Verify nebula-sync installation
      ansible.builtin.command:
        cmd: "{{ nebula_sync_install_dir }}/nebula-sync --version"
      register: nebula_sync_version_check
      changed_when: false
      tags: [install]

    - name: Display nebula-sync version
      ansible.builtin.debug:
        var: nebula_sync_version_check.stdout
      tags: [install]

    # =========================================================================
    # CONFIGURATION
    # =========================================================================
    - name: Create nebula-sync config directory
      ansible.builtin.file:
        path: "{{ nebula_sync_config_dir }}"
        state: directory
        mode: "0700"
      tags: [configure]

    - name: Deploy nebula-sync configuration
      ansible.builtin.template:
        src: ../templates/nebula-sync.env.j2
        dest: "{{ nebula_sync_config_dir }}/config.env"
        mode: "0600"
      notify: Restart nebula-sync timer
      tags: [configure]

    # =========================================================================
    # SYSTEMD SERVICE AND TIMER
    # =========================================================================
    - name: Deploy nebula-sync systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/nebula-sync.service
        mode: "0644"
        content: |
          [Unit]
          Description=nebula-sync Pi-hole configuration sync
          After=network-online.target pihole-FTL.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart={{ nebula_sync_install_dir }}/nebula-sync run --env-file {{ nebula_sync_config_dir }}/config.env
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd
      tags: [service]

    - name: Deploy nebula-sync systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/nebula-sync.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Run nebula-sync every 15 minutes

          [Timer]
          OnBootSec=5min
          OnUnitActiveSec=15min
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify:
        - Reload systemd
        - Restart nebula-sync timer
      tags: [service]

    - name: Enable and start nebula-sync timer
      ansible.builtin.systemd:
        name: nebula-sync.timer
        state: started
        enabled: true
        daemon_reload: true
      tags: [service]

    # =========================================================================
    # INITIAL SYNC (only if primary is reachable)
    # =========================================================================
    - name: Check if primary Pi-hole is reachable
      ansible.builtin.uri:
        url: "http://{{ sync_partner_transfer_ip }}/api/auth"
        method: GET
        status_code: [200, 401, 405]  # Any response means Pi-hole is up
        timeout: 5
      register: primary_check
      failed_when: false
      tags: [configure]

    - name: Set primary reachability fact
      ansible.builtin.set_fact:
        primary_reachable: "{{ primary_check.status is defined and primary_check.status > 0 }}"
      tags: [configure]

    - name: Report primary availability
      ansible.builtin.debug:
        msg: >-
          Primary ({{ sync_partner_transfer_ip }}) is
          {{ 'REACHABLE (status=' ~ primary_check.status ~ ')' if primary_reachable else 'NOT REACHABLE' }}.
          {{ 'Running initial sync...' if primary_reachable
             else 'Skipping initial sync - timer will retry once blue is deployed.' }}
      tags: [configure]

    - name: Run initial sync (best-effort, timer retries every 15 min)
      ansible.builtin.command:
        cmd: systemctl start nebula-sync.service
      register: initial_sync
      changed_when: initial_sync.rc == 0
      failed_when: false
      when: primary_reachable
      tags: [configure]

    - name: Report initial sync result
      ansible.builtin.debug:
        msg: >-
          Initial sync {{ 'succeeded' if initial_sync.rc == 0 else 'failed (rc=' ~ initial_sync.rc ~ ') — timer will retry in ≤15 min' }}
      when: primary_reachable and initial_sync.rc is defined
      tags: [configure]

    # =========================================================================
    # VERIFICATION
    # =========================================================================
    - name: Verify timer is active
      ansible.builtin.command:
        cmd: systemctl is-active nebula-sync.timer
      register: timer_status
      changed_when: false
      tags: [verify]

    - name: Display verification results
      vars:
        initial_sync_status: >-
          {% if not (primary_reachable | default(false)) %}skipped (primary not reachable)
          {%- elif initial_sync.rc | default(1) == 0 %}completed
          {%- else %}failed — timer will retry{%- endif %}
      ansible.builtin.debug:
        msg: |
          nebula-sync configured on {{ inventory_hostname }}:
          - Syncing FROM: {{ sync_partner_transfer_ip }} (transfer network)
          - Timer status: {{ timer_status.stdout }}
          - Schedule: Every 15 minutes
          - Initial sync: {{ initial_sync_status }}
      tags: [verify]

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nebula-sync timer
      ansible.builtin.systemd:
        name: nebula-sync.timer
        state: restarted
