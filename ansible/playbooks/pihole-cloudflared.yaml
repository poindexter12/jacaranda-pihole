---
# Pi-hole + Cloudflared DoH Integration Playbook
#
# Deploys cloudflared and reconfigures Pi-hole to use it as upstream DNS.
# Run this on existing Pi-hole LXCs to enable DNS-over-HTTPS.
#
# Usage:
#   ansible-playbook -i inventory/pihole-lxc.yml playbooks/pihole-cloudflared.yml
#
# What this does:
#   1. Installs cloudflared binary
#   2. Deploys profile-aware config (standard→1.1.1.1, restricted→1.1.1.3)
#   3. Starts cloudflared systemd service
#   4. Reconfigures Pi-hole to use 127.0.0.1#5053 as upstream
#   5. Verifies end-to-end DNS resolution
#
# Tags:
#   cloudflared - Install and configure cloudflared only
#   pihole      - Reconfigure Pi-hole upstream only
#   verify      - Verify integration

- name: Deploy Cloudflared DoH and integrate with Pi-hole
  hosts: pihole_lxc
  gather_facts: true

  vars:
    # Package pre-downloaded by `make fetch` to .packagecache/
    # Version pinned in versions.yaml
    cloudflared_version: "2025.11.1"
    cloudflared_upstream:
      standard: "https://1.1.1.1/dns-query"
      restricted: "https://1.1.1.3/dns-query"
    cloudflared_port: 5053

  tasks:
    # =========================================================================
    # CLOUDFLARED INSTALLATION
    # =========================================================================
    # Package pre-downloaded by `make prefetch` - no external dependencies
    - name: Check if cloudflared is installed
      ansible.builtin.stat:
        path: /usr/local/bin/cloudflared
      register: cloudflared_binary
      tags: [cloudflared]

    - name: Verify local package exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../.packagecache/cloudflared/{{ cloudflared_version }}/cloudflared-linux-amd64"
      register: local_cloudflared
      delegate_to: localhost
      run_once: true
      tags: [cloudflared]

    - name: Fail if package not fetched
      ansible.builtin.fail:
        msg: "cloudflared not found in cache. Run 'make fetch' first."
      when:
        - not cloudflared_binary.stat.exists
        - not local_cloudflared.stat.exists
      tags: [cloudflared]

    - name: Copy cloudflared binary from local cache
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.packagecache/cloudflared/{{ cloudflared_version }}/cloudflared-linux-amd64"
        dest: /usr/local/bin/cloudflared
        mode: "0755"
      when: not cloudflared_binary.stat.exists
      tags: [cloudflared]

    - name: Create cloudflared config directory
      ansible.builtin.file:
        path: /etc/cloudflared
        state: directory
        mode: "0755"
      tags: [cloudflared]

    - name: Deploy cloudflared configuration
      ansible.builtin.template:
        src: ../templates/cloudflared.yml.j2
        dest: /etc/cloudflared/config.yml
        mode: "0644"
      notify: Restart cloudflared
      tags: [cloudflared]

    - name: Deploy cloudflared systemd service
      ansible.builtin.template:
        src: ../templates/cloudflared.service.j2
        dest: /etc/systemd/system/cloudflared.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart cloudflared
      tags: [cloudflared]

    - name: Enable and start cloudflared service
      ansible.builtin.systemd:
        name: cloudflared
        state: started
        enabled: true
        daemon_reload: true
      tags: [cloudflared]

    - name: Wait for cloudflared to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ cloudflared_port }}"
        timeout: 30
      tags: [cloudflared]

    - name: Test cloudflared DNS resolution
      ansible.builtin.command:
        cmd: dig @127.0.0.1 -p {{ cloudflared_port }} cloudflare.com +short +timeout=5
      register: cloudflared_test
      changed_when: false
      failed_when: cloudflared_test.rc != 0 or cloudflared_test.stdout == ""
      tags: [cloudflared]

    # =========================================================================
    # PI-HOLE RECONFIGURATION
    # =========================================================================
    # Pi-hole v6 uses pihole.toml for configuration
    # DNS upstream is set via dns.upstreams array
    - name: Configure Pi-hole to use cloudflared as upstream (pihole.toml)
      ansible.builtin.lineinfile:
        path: /etc/pihole/pihole.toml
        regexp: '^\s*upstreams\s*='
        line: '  upstreams = ["127.0.0.1#{{ cloudflared_port }}"]'
        insertafter: '^\[dns\]'
      notify: Restart pihole-FTL
      tags: [pihole]

    # Pi-hole v6: use systemctl instead of deprecated pihole restartdns
    - name: Restart Pi-hole DNS resolver
      ansible.builtin.systemd:
        name: pihole-FTL
        state: restarted
      changed_when: true
      tags: [pihole]

    # =========================================================================
    # END-TO-END VERIFICATION
    # =========================================================================
    - name: Wait for Pi-hole DNS to stabilize
      ansible.builtin.pause:
        seconds: 10
      tags: [verify]

    - name: Test DNS resolution through Pi-hole
      ansible.builtin.command:
        cmd: dig @{{ trusted_ip | default(dns_ip) }} google.com +short +timeout=5
      register: pihole_dns_test
      changed_when: false
      failed_when: pihole_dns_test.rc != 0 or pihole_dns_test.stdout == ""
      retries: 6
      delay: 10
      tags: [verify]

    - name: Test blocked domain (should return 0.0.0.0)
      ansible.builtin.command:
        cmd: dig @{{ trusted_ip | default(dns_ip) }} doubleclick.net +short +timeout=5
      register: blocked_test
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Verify DoH integration
      vars:
        dns_result: "{{ pihole_dns_test.stdout_lines[0] | default('?') }}"
        ads_result: "{{ blocked_test.stdout | default('blocked') }}"
      ansible.builtin.assert:
        that:
          - pihole_dns_test.rc == 0
          - pihole_dns_test.stdout != ""
        quiet: true
        fail_msg: "DNS resolution failed on {{ inventory_hostname }}"
        success_msg: "{{ inventory_hostname }} ({{ profile }}): DoH active, google.com → {{ dns_result }}, ads → {{ ads_result }}"
      tags: [verify]

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: restarted

    - name: Restart pihole-FTL
      ansible.builtin.systemd:
        name: pihole-FTL
        state: restarted
