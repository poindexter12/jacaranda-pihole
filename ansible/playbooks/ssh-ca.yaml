---
# SSH CA Configuration for Pi-hole LXCs
#
# Configures SSH certificate authentication on Pi-hole containers.
# Run after pihole-lxc.yml and after host certs are signed.
#
# Usage:
#   # Sign certs first
#   make -C ../../../ansible sign-certs INVENTORY=inventory/prod.yaml
#
#   # Then configure sshd
#   ansible-playbook -i inventory/prod.yaml playbooks/ssh-ca.yaml
#
# Or use the integrated Makefile targets:
#   make prod-ssh-ca    # Signs certs + configures

- name: Configure SSH certificate authentication
  hosts: pihole_lxc
  gather_facts: true
  roles:
    - role: ../../../../ansible/roles/ssh-ca
      vars:
        ssh_ca_user_pubkey: "{{ lookup('pipe', 'op read op://Homelab/ssh-ca-user/public_key') }}"
        # Keep authorized_keys as fallback initially
        ssh_ca_clear_authorized_keys: false
