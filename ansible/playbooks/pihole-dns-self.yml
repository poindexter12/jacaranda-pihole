---
# DNS Self-Registration for Pi-hole Instances
#
# Adds DNS entries for ALL interfaces on each Pi-hole instance:
#   - {hostname}.trusted  → trusted network IP (192.168.1.x)
#   - {hostname}.mgmt     → management network IP (192.168.5.x)
#   - {hostname}.storage  → storage network IP (192.168.11.x)
#
# Plus CNAME for naked hostname → .trusted (so dns-standard-primary resolves to trusted IP)
#
# Run: ansible-playbook -i inventory/prod.yml playbooks/pihole-dns-self.yml

- name: Configure DNS entries for Pi-hole instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Primary DNS server for record management
    dns_admin_host: "{{ groups['pihole_primary'] | first | default('dns-standard-primary') }}"
    dns_admin_ip: "{{ hostvars[dns_admin_host]['mgmt_ip'] }}"
    dns_ssh_key: ~/.ssh/jacaranda

  tasks:
    - name: Build DNS A records for all interfaces
      set_fact:
        dns_a_records: |
          {% for host in groups['pihole_lxc'] | default([]) %}
          {% set h = hostvars[host] %}
          - hostname: "{{ host }}.trusted"
            ip: "{{ h.trusted_ip | default(h.dns_ip) }}"
          - hostname: "{{ host }}.mgmt"
            ip: "{{ h.mgmt_ip }}"
          - hostname: "{{ host }}.storage"
            ip: "{{ h.storage_ip | default(h.transfer_ip) }}"
          {% endfor %}

    - name: Build CNAME records (naked → trusted)
      set_fact:
        dns_cname_records: |
          {% for host in groups['pihole_lxc'] | default([]) %}
          - name: "{{ host }}"
            target: "{{ host }}.trusted"
          {% endfor %}

    - name: Display DNS A records to be created
      debug:
        msg: "{{ dns_a_records | from_yaml }}"

    - name: Display CNAME records to be created
      debug:
        msg: "{{ dns_cname_records | from_yaml }}"

    - name: Add DNS A records to Pi-hole
      delegate_to: "{{ dns_admin_ip }}"
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ dns_ssh_key }}"
        ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
      shell: |
        # Check if record exists, add if not
        if ! grep -q "^{{ item.ip }} {{ item.hostname }}$" /etc/pihole/custom.list 2>/dev/null; then
          echo "{{ item.ip }} {{ item.hostname }}" >> /etc/pihole/custom.list
          echo "added"
        else
          echo "exists"
        fi
      loop: "{{ dns_a_records | from_yaml }}"
      register: dns_a_result
      changed_when: "'added' in dns_a_result.stdout"

    - name: Add CNAME records to dnsmasq
      delegate_to: "{{ dns_admin_ip }}"
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ dns_ssh_key }}"
        ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
      copy:
        dest: /etc/dnsmasq.d/05-pihole-self-cnames.conf
        content: |
          # Pi-hole self-referential CNAME records
          # Naked hostname → .trusted (default to trusted network)
          # Auto-generated by Ansible - do not edit manually
          {% for cname in dns_cname_records | from_yaml %}
          cname={{ cname.name }},{{ cname.target }}
          {% endfor %}
        mode: "0644"
      register: cname_result

    - name: Restart DNS service
      delegate_to: "{{ dns_admin_ip }}"
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ dns_ssh_key }}"
        ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
      command: pihole restartdns
      when: dns_a_result.changed or cname_result.changed

    - name: Summary
      debug:
        msg: |
          DNS entries configured on {{ dns_admin_host }} ({{ dns_admin_ip }})
          A records: {{ (dns_a_records | from_yaml) | length }}
          CNAME records: {{ (dns_cname_records | from_yaml) | length }}

          Usage:
            dig dns-standard-primary.trusted  → 192.168.1.20
            dig dns-standard-primary.mgmt     → 192.168.5.20
            dig dns-standard-primary.storage  → 192.168.11.20
            dig dns-standard-primary          → CNAME → dns-standard-primary.trusted → 192.168.1.20
